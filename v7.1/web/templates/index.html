<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myclang C 代码静态分析</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>myclang C 代码静态分析</h1>
            <p class="subtitle">粘贴 C 代码，一键检查代码规范</p>
        </header>

        <main>
            <!-- 左侧: 代码输入 -->
            <section class="input-panel">
                <div class="panel-header">
                    <h2>源代码</h2>
                    <button id="sampleBtn" class="btn-sm">加载示例</button>
                </div>
                <textarea id="codeInput" placeholder="在此粘贴 C 代码...&#10;&#10;int main() {&#10;    return 0;&#10;}" spellcheck="false"></textarea>

                <!-- 阈值设置 -->
                <details class="thresholds">
                    <summary>阈值设置（点击展开）</summary>
                    <div class="threshold-grid">
                        <label>函数行数上限 <input type="number" id="maxLines" value="50" min="1"></label>
                        <label>单行长度 <input type="number" id="maxLineLength" value="100" min="1"></label>
                        <label>圈复杂度 <input type="number" id="maxCcn" value="10" min="1"></label>
                        <label>参数个数 <input type="number" id="maxParams" value="5" min="1"></label>
                        <label>嵌套深度 <input type="number" id="maxNesting" value="4" min="1"></label>
                    </div>
                </details>

                <button id="analyzeBtn" class="btn-primary">开始分析</button>
            </section>

            <!-- 右侧: 分析结果 -->
            <section class="result-panel">
                <h2>分析结果</h2>
                <div id="resultArea">
                    <div class="placeholder">
                        <span class="icon">&#x1F50D;</span>
                        <p>在左侧输入代码，点击「开始分析」</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
